name: 🚀 Deploy Daily Discipline Trainer to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout your code
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # 2. Install Flutter
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # 3. Install dependencies
      - name: 📦 Install Dependencies
        run: flutter pub get

      # 4. Build Flutter Web
      - name: 🔨 Build Flutter Web
        run: |
          flutter build web --release \
            --base-href "/${{ github.event.repository.name }}/" \
            --web-renderer canvaskit

      # 5. Fix paths for GitHub Pages subdirectory
      - name: 🔧 Fix Asset Paths
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          sed -i "s|<base href=\"/\">|<base href=\"/$REPO_NAME/\">|g" build/web/index.html || true
          echo "✅ Paths fixed for repo: $REPO_NAME"

      # 6. Setup GitHub Pages
      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v5

      # 7. Upload the built web app
      - name: 📤 Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/web'

      # 8. Deploy to GitHub Pages
      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 9. Print the live URL
      - name: ✅ Print Live URL
        run: |
          echo "🎉 Your app is live at:"
          echo "${{ steps.deployment.outputs.page_url }}"
          echo ""
          echo "📱 On iPhone 15:"
          echo "1. Open Safari → go to the URL above"
          echo "2. Tap Share button (box with arrow)"
          echo "3. Tap 'Add to Home Screen'"
          echo "4. Tap Add — app icon appears on home screen!"
